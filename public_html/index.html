<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="main.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="custom.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

  <title>Aura's Portfolio</title>
  <link rel="shortcut icon" href="Assets/haloBullet.ico" type="image/x-icon">
</head>
<body>
  <canvas id="grid-canvas"></canvas>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-content">
      <h2>Aura</h2>
      <button class="hero-enter" onclick="scrollToContent()">Enter</button>
    </div>
  </div>

  <!-- Header -->
  <div class="header-container container my-2 p-3" id="main-content">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
      <ul class="nav justify-content-end flex-nowrap mb-0">
        <li class="nav-item">
          <a class="nav-link" href="https://github.com/FixesMix/" target="_blank">
            <img class="nav-icon" src="Assets/github2.png" alt="GitHub">
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="https://www.linkedin.com/in/auraoa/" target="_blank">
            <img class="nav-icon" src="Assets/linkedin2.png" alt="LinkedIn">
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="Assets/Aura_Akunne_Resume_5-7-2026.pdf" download target="_blank">
            <img class="nav-icon" src="Assets/resume.png" alt="Resume">
          </a>
        </li>
      </ul>
    </div>
  </div>

  <!-- Main container -->
  <div class="container my-4 my-md-5 p-3 p-md-4 fade-in">
    <div class="row align-items-stretch g-3">

      <!-- Left side — no card, just content on the page -->
      <div class="col-12 col-md-6 order-md-1 d-flex align-items-stretch">
        <div class="profile-panel w-100">

          <div class="profile-name">Aura Akunne</div>
          <div class="profile-title">Junior Software Developer</div>

          <div class="profile-divider"></div>

          <div class="profile-section">
            <span class="profile-label">Skills</span>
            <p class="profile-skills">C#  ·  Java  ·  .NET Core  ·  ASP.NET Web API  ·  EF Core</p>
          </div>

          <div class="profile-section">
            <span class="profile-label">Certifications</span>
            <ul class="cert-list">
              <li>Because She Can (Cohort 4) — Outstanding Achievement</li>
              <li>Foundational C# with Microsoft</li>
              <li>AI4ALL College Pathways Participant</li>
            </ul>
          </div>

          <div class="profile-footer">
            <img src="Assets/mail.png" alt="Contact"
                 class="profile-mail"
                 data-bs-toggle="modal" data-bs-target="#emailModal">
            <span class="profile-contact-label" data-bs-toggle="modal" data-bs-target="#emailModal">Contact</span>
          </div>

        </div>
      </div>

      <!-- Carousel column -->
      <div class="col-12 col-md-6 order-md-2">
        <div id="projectCarousel" class="carousel slide carousel-fade h-100"
             data-bs-ride="carousel" data-bs-interval="6000">
          <div class="carousel-inner h-100">
            <div class="carousel-item active">
              <a href="https://github.com/FixesMix/Bellbloom" target="_blank">
                <img src="Assets/SchoolManagement.png" class="d-block w-100" alt="Bellbloom">
              </a>
            </div>
            <div class="carousel-item">
              <a href="https://github.com/FixesMix/Notella" target="_blank">
                <img src="Assets/NotesApplication.png" class="d-block w-100" alt="Notella">
              </a>
            </div>
            <div class="carousel-item">
              <a href="https://github.com/FixesMix/System_Dashboard" target="_blank">
                <img src="Assets/CPUGPU.png" class="d-block w-100" alt="GPU/CPU Monitor">
              </a>
            </div>
          </div>
          <button class="carousel-control-prev" type="button"
                  data-bs-target="#projectCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>
          <button class="carousel-control-next" type="button"
                  data-bs-target="#projectCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- Contact modal -->
  <div class="modal fade" id="emailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <button type="button" class="close" data-bs-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body px-4 pb-4">
          <form id="contactForm">
            <div class="row gx-3">
              <div class="col-12 col-sm-6">
                <div class="form-group mt-3">
                  <input type="text" id="senderName" class="form-control" placeholder="Name" required>
                </div>
              </div>
              <div class="col-12 col-sm-6">
                <div class="form-group mt-3">
                  <input type="email" id="senderEmail" class="form-control" placeholder="you@example.com" required>
                </div>
              </div>
              <div class="col-12">
                <div class="form-group mt-3">
                  <textarea id="senderMessage" class="form-control w-100" rows="5" placeholder="Your message..." required></textarea>
                </div>
              </div>
              <div class="col-12 d-flex justify-content-center mt-4">
                <button type="submit" id="submitBtn">Send Message</button>
              </div>
              <div class="col-12 text-center mt-3" id="formStatus" style="font-size:0.75rem; font-family: var(--font-display); letter-spacing: 0.1em; display:none;"></div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer-container container text-center text-white py-2">
    <div class="sliding-footer">
      <img src="Assets/mallow_Walk_BW.gif" class="footer-image" alt="Mallow walking">
      <div class="feeties"></div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Grid canvas
    const canvas = document.getElementById('grid-canvas');
    const ctx = canvas.getContext('2d');
    const CELL = 48;
    let offset = 0;
    let lastTime = 0;
    const SPEED = 12; // px per second

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function draw(ts) {
      const dt = (ts - lastTime) / 1000;
      lastTime = ts;
      offset = (offset + SPEED * dt) % CELL;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let x = (offset % CELL) - CELL; x < canvas.width + CELL; x += CELL) {
        ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
      }
      for (let y = (offset % CELL) - CELL; y < canvas.height + CELL; y += CELL) {
        ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
      }
      ctx.stroke();
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  </script>
  <script src="config.js"></script>
  <script src="scripts.js"></script>
</body>
</html>
